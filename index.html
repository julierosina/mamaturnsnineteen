<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 19th ✦</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="welcome">
    <!-- Ghost number behind photo -->
    <div class="bg-number">19</div>

    <!-- Decorative color blocks (risograph-style) -->
    <div class="color-block color-block-1"></div>
    <div class="color-block color-block-2"></div>
    <div class="color-block color-block-3"></div>

    <p class="note-label">Please note...</p>

    <!-- Hero photo -->
    <div class="hero-photo">
      <img src="images/her.jpg" alt="La birthday girl">
    </div>

    <!-- Ant trail dots -->
    <div class="trail">
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
      <div class="trail-dot"></div>
    </div>

    <!-- Headline -->
    <div class="headline-block">
      <p class="headline-top">19 ans · mai 2026</p>
      <h1 class="headline-main"><em>Julie</em><br>is turning<br>nineteen.</h1>
      <p class="headline-sub">— un mot de chacun d'eux ci-dessous</p>
    </div>

    <p class="click-hint">↓ cliquer sur une photo</p>

    <!-- Sticker navigation -->
    <div class="stickers">
      <a class="sticker-link" href="maman.html">
        <img class="sticker-img" src="images/maman-her.jpg" alt="Maman">
        <span class="sticker-name">Maman</span>
      </a>
      <a class="sticker-link" href="papa.html">
        <img class="sticker-img" src="images/papa-her.jpg" alt="Papa">
        <span class="sticker-name">Papa</span>
      </a>
      <a class="sticker-link" href="julie.html">
        <img class="sticker-img" src="images/julie-her.jpg" alt="Juju">
        <span class="sticker-name">Juju</span>
      </a>
    </div>
  </div>
</body>
</html>
